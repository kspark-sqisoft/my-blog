# 운영 환경 nginx 설정: 정적 SPA 서빙 + /api·seo 산출물 프록시
# conf.d/default.conf 로 마운트되어 http 컨텍스트에 include 되므로 map 사용 가능.

# 크롤러/SNS 봇 User-Agent 판별 (ADR-0026, seo-feed).
# 봇이면 글 상세를 api 의 OG 메타 HTML 로, 사람이면 기존 SPA 로 보낸다.
map $http_user_agent $is_crawler {
    default 0;
    "~*(facebookexternalhit|Twitterbot|kakaotalk|Slackbot|Discordbot|Googlebot|bingbot|LinkedInBot|WhatsApp|TelegramBot|Applebot|redditbot)" 1;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 프록시 공통 헤더 (httpOnly 쿠키 same-site 유지). server 레벨에서 location 들이 상속.
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API 요청은 같은 오리진으로 받아 api 컨테이너로 프록시
    location /api/ {
        proxy_pass http://api:3000;
    }

    # 업로드 이미지: api 컨테이너의 정적 서빙으로 프록시
    location /uploads/ {
        proxy_pass http://api:3000;
    }

    # seo-feed 산출물 (ADR-0026): /api prefix 에서 제외된 루트 경로 — api 가 생성
    location = /feed.xml {
        proxy_pass http://api:3000;
    }
    location = /sitemap.xml {
        proxy_pass http://api:3000;
    }
    location = /robots.txt {
        proxy_pass http://api:3000;
    }
    # 봇 OG 메타 HTML (직접 호출 및 아래 /posts 분기의 대상)
    location /og/ {
        proxy_pass http://api:3000;
    }

    # 글 상세: 크롤러면 OG 메타 HTML(api /og/posts/:slug), 사람이면 SPA (ADR-0026).
    # if 가 매칭(봇)되면 proxy 로 처리되고, 아니면 location 의 try_files(SPA)를 탄다.
    location ~ ^/posts/(.*)$ {
        if ($is_crawler) {
            proxy_pass http://api:3000/og/posts/$1;
        }
        try_files $uri $uri/ /index.html;
    }

    # SPA 라우팅: 정적 파일 없으면 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }
}
