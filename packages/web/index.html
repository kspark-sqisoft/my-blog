<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <title>디버그 노트</title>
    <!-- seo-feed (ADR-0026): 피드 자동발견 + 사이트 기본 OG(글별 동적 OG 는 봇 경로 /og/posts/:slug 담당) -->
    <link
      rel="alternate"
      type="application/rss+xml"
      title="디버그 노트"
      href="/feed.xml"
    />
    <meta property="og:site_name" content="디버그 노트" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="디버그 노트" />
    <meta
      property="og:description"
      content="개발하며 배운 것과 디버깅 기록을 남기는 블로그"
    />
    <meta property="og:image" content="/og-default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="디버그 노트" />
    <meta
      name="twitter:description"
      content="개발하며 배운 것과 디버깅 기록을 남기는 블로그"
    />
    <meta name="twitter:image" content="/og-default.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
