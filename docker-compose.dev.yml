# 개발 오버라이드: 소스 볼륨 마운트로 핫리로드.
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  db:
    # 로컬에서 Prisma 마이그레이션/접속을 위해 호스트로 포트 노출 (개발 전용)
    # 호스트 5432 충돌을 피해 5433으로 매핑 (DATABASE_URL은 localhost:5433)
    ports:
      - "5433:5432"

  api:
    build:
      target: dev
    # 컨테이너 안에서 (1) @blog/shared 빌드 → (2) Prisma 클라이언트 생성 → (3) 개발 서버 기동.
    # (1) 필수: api(CJS)는 @blog/shared 를 dist(빌드 산출물)로 해석한다. shared 소스가 머지/풀/편집으로
    #     바뀌었는데 dist 가 오래되면 nest 컴파일이 깨져 서버가 안 뜬다(→ vite 프록시 502). 매 기동마다
    #     shared 를 먼저 빌드해 dist 를 최신화한다. (dist 는 gitignore 라 커밋으로 갱신되지 않음)
    command: sh -c "pnpm --filter @blog/shared run build && pnpm exec prisma generate && pnpm run start:dev"
    environment:
      # Windows 바인드 마운트에서 파일 변경 감지를 위한 폴링
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # 패키지 디렉터리 통째 마운트(vite/tsconfig/prisma 포함), node_modules는 이미지 것 보존
      - ./packages/api:/repo/packages/api
      - /repo/packages/api/node_modules
      - ./packages/shared:/repo/packages/shared
      - /repo/packages/shared/node_modules
    # 호스트 3000 충돌 회피 — 호스트 3001 → 컨테이너 3000 (웹은 내부 네트워크로 api:3000 사용)
    ports:
      - "3001:3000"

  web:
    build:
      target: dev
    environment:
      # Vite 파일 감시 폴링 활성화 (vite.config.ts에서 사용)
      VITE_USE_POLLING: "true"
      # 컨테이너에서 /api 프록시 대상은 내부 api 서비스
      VITE_API_PROXY: "http://api:3000"
    volumes:
      - ./packages/web:/repo/packages/web
      - /repo/packages/web/node_modules
      - ./packages/shared:/repo/packages/shared
      - /repo/packages/shared/node_modules
    ports:
      - "5173:5173"
