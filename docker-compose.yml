# 베이스 구성: 모든 환경 공통.
# dev/prod 오버라이드와 함께 사용한다.
#   개발: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   운영: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
name: my-blog

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blog}
      POSTGRES_DB: ${POSTGRES_DB:-blog}
    volumes:
      - db-data:/var/lib/postgresql/data
    # healthcheck: api가 db 준비 후 시작하도록 게이트 역할
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blog} -d ${POSTGRES_DB:-blog}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-blog}:${POSTGRES_PASSWORD:-blog}@db:5432/${POSTGRES_DB:-blog}?schema=public
      PORT: 3000
      # JWT 서명 시크릿. 폴백 없이 부팅 시점에 강제(requireJwtSecret — C1).
      # 미설정이면 compose 자체가 실패해 운영에서 'change-me' 같은 위험 폴백 사용을 차단한다.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (set in .env)}
      # 업로드 크기 상한 (ADR-0020). 이미지/비디오 분리 한도.
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-5242880}
      UPLOAD_MAX_BYTES_VIDEO: ${UPLOAD_MAX_BYTES_VIDEO:-52428800}
      # seo-feed (ADR-0026): 피드·사이트맵·OG 절대 URL 기준 + 피드 항목 상한
      SITE_URL: ${SITE_URL:-http://localhost:5173}
      FEED_MAX_ITEMS: ${FEED_MAX_ITEMS:-20}
    depends_on:
      db:
        # db healthcheck가 통과해야 api 시작
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    depends_on:
      - api

volumes:
  db-data:
