# my-blog CI (T-INFRA-006, ADR-0014).
# 2 job 병렬: quality(lint/typecheck/단위/api-e2e) + web-e2e(격리 Playwright).
# 둘 다 통과해야 머지 가능(브랜치 보호의 required status checks 로 게이트).
name: CI

on:
  pull_request:
  push:
    branches: [main]

# 동일 ref 의 이전 워크플로 실행은 자동 취소 — 빠른 피드백
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  # pnpm 버전은 package.json 의 packageManager 가 단일 출처(pnpm/action-setup 가 자동 인식)

jobs:
  quality:
    name: Quality (lint · typecheck · unit · api-e2e)
    runs-on: ubuntu-latest
    # Postgres service container 하나로 dev(blog) + test(blog_test) 모두 호스팅.
    # jest setup 이 DATABASE_URL 을 blog_test 로 강제하므로 step 의 env 는 dev 만 가리킨다.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: blog
          POSTGRES_PASSWORD: blog
          POSTGRES_DB: blog
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blog -d blog"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://blog:blog@localhost:5432/blog?schema=public
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # 버전은 package.json 의 packageManager(pnpm@x) 단일 출처를 따른다.
        # with.version 을 함께 주면 action-setup@v4 가 "Multiple versions" 로 실패한다.
        uses: pnpm/action-setup@v4

      - name: Setup Node + pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # api(CJS)·jest 는 @blog/shared 를 빌드 산출물(dist)로 해석한다. dist 는 gitignore 라
      # 신선 체크아웃엔 없으므로 CI 에서 반드시 빌드한다(없으면 api 단계가 "no exported member"로 실패).
      - name: Build @blog/shared
        run: pnpm --filter @blog/shared build

      - name: Prisma generate
        run: pnpm --filter api exec prisma generate

      - name: Create blog_test DB + migrate (dev + test)
        env:
          PGPASSWORD: blog
        run: |
          psql -h localhost -U blog -d blog -c "CREATE DATABASE blog_test"
          pnpm --filter api exec prisma migrate deploy
          DATABASE_URL="postgresql://blog:blog@localhost:5432/blog_test?schema=public" \
            pnpm --filter api exec prisma migrate deploy

      - name: Web — lint
        run: pnpm --filter web lint

      - name: Web — typecheck
        run: pnpm --filter web typecheck

      - name: Web — vitest
        run: pnpm --filter web test

      - name: API — lint
        run: pnpm --filter api lint

      - name: API — jest unit (blog_test)
        run: pnpm --filter api test

      - name: API — jest e2e (blog_test)
        run: pnpm --filter api test:e2e

      - name: MCP tool unit (prisma-helper)
        run: pnpm mcp:test

      - name: Harness doctor (거버넌스 드리프트 센서)
        run: pnpm harness:doctor

  web-e2e:
    name: Web E2E (Playwright, isolated stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # 버전은 package.json 의 packageManager(pnpm@x) 단일 출처를 따른다.
        # with.version 을 함께 주면 action-setup@v4 가 "Multiple versions" 로 실패한다.
        uses: pnpm/action-setup@v4

      - name: Setup Node + pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # 호스트에서 도는 prisma migrate/seed(tsx) 와 격리 스택 빌드가 @blog/shared(dist)를 참조한다.
      - name: Build @blog/shared
        run: pnpm --filter @blog/shared build

      # 격리 스크립트는 호스트에서 prisma migrate deploy + db:seed 를 수행한다.
      - name: Prisma generate (host runtime)
        run: pnpm --filter api exec prisma generate

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Setup Docker Buildx (격리 스택 prod 빌드 캐시)
        uses: docker/setup-buildx-action@v3

      - name: Run isolated Playwright E2E
        run: pnpm --filter web test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: |
            packages/web/playwright-report/
            packages/web/test-results/
          retention-days: 7
          if-no-files-found: ignore

  gc:
    name: Garbage Collection (dead code · duplication, 비차단)
    runs-on: ubuntu-latest
    # 정보 제공용 센서 — 머지를 막지 않는다(required check 에서 제외).
    # 가이드 12.5: 에이전트는 '추가'에 강하고 '삭제'에 약하다 → 미사용/중복을 지속 감지.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # 버전은 package.json 의 packageManager(pnpm@x) 단일 출처를 따른다.
        # with.version 을 함께 주면 action-setup@v4 가 "Multiple versions" 로 실패한다.
        uses: pnpm/action-setup@v4

      - name: Setup Node + pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # knip 이 @blog/shared 의 export 해석 시 dist 를 참조할 수 있어 미리 빌드(비차단 잡이지만 정확도↑).
      - name: Build @blog/shared
        run: pnpm --filter @blog/shared build

      - name: Unused files/exports (knip)
        continue-on-error: true
        run: pnpm gc:unused

      - name: Duplication (jscpd)
        continue-on-error: true
        run: pnpm gc:dup

  secrets:
    name: Secret scan (gitleaks, 규칙 #4 강제)
    runs-on: ubuntu-latest
    # 차단형: 하드코딩된 비밀/토큰이 발견되면 머지를 막는다(.env 편집 차단만으로는 못 잡음).
    # 워킹트리(dir) 스캔 — 로컬 docker 스캔과 동일. allowlist 는 .gitleaks.toml.
    steps:
      - uses: actions/checkout@v4

      - name: gitleaks (working tree scan)
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            dir /repo --config /repo/.gitleaks.toml --no-banner --redact
